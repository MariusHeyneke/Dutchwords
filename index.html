<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🦁 Dutch De/Het Adventure! 🦁</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');

    body {
      font-family: 'Fredoka', "Comic Sans MS", sans-serif;
      background: linear-gradient(135deg, #FFEB3B, #FF9800, #FF4081);
      margin: 0;
      padding: 15px;
      min-height: 100vh;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      font-size: 2.9rem;
      color: #D32F2F;
      margin: 10px 0 8px;
      text-shadow: 4px 4px 0 #fff;
      animation: bounce 2s infinite alternate;
    }

    .subtitle { 
      font-size: 1.5rem; 
      color: #1976D2; 
      margin-bottom: 15px; 
    }

    .top-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: nowrap;           /* Prevent wrapping */
      width: 100%;
      max-width: 520px;
      margin: 0 auto 20px;
    }

    .score, .streak {
      font-size: 1.65rem;
      padding: 10px 24px;
      border-radius: 50px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      white-space: nowrap;        /* Prevent text from wrapping */
      flex-shrink: 0;             /* Never shrink */
      min-width: 160px;
    }

    .score { background: white; color: #388E3C; }
    .streak { background: #FF4081; color: white; }

    .card {
      background: white;
      border-radius: 30px;
      padding: 40px 20px;
      margin: 25px auto;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      min-height: 240px;
      transition: transform 0.4s;
    }

    .card:hover { transform: scale(1.02); }

    .english { 
      font-size: 1.55rem; 
      color: #555; 
      margin-bottom: 8px; 
    }

    .word {
      font-size: 5rem;
      font-weight: 700;
      color: #1976D2;
      margin: 15px 0;
      transition: all 0.4s ease;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 35px 0;
      flex-wrap: wrap;
    }

    button.de-btn, button.het-btn {
      font-size: 2.6rem;
      font-weight: 700;
      padding: 22px 55px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 10px 0 #00000040;
      min-width: 170px;
    }

    .de-btn { background: linear-gradient(#FF4081, #F50057); color: white; }
    .het-btn { background: linear-gradient(#4CAF50, #2E7D32); color: white; }

    button:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 #00000040;
    }

    .feedback {
      font-size: 2rem;
      min-height: 85px;
      margin: 15px 0;
      font-weight: bold;
    }

    .next-btn {
      font-size: 1.5rem;
      padding: 16px 45px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      display: none;
      margin: 20px auto;
    }

    .volume-control {
      margin-top: 25px;
    }

    @keyframes bounce {
      from { transform: translateY(-8px); }
      to { transform: translateY(8px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🦁 Dutch De/Het Adventure! 🦁</h1>
    <p class="subtitle">Learn Dutch articles with fun!</p>

    <div class="top-controls">
      <select id="categorySelect">
        <option value="all">🌟 All Words</option>
        <option value="animals">🐶 Animals</option>
        <option value="food">🍎 Food & Drink</option>
        <option value="house">🏠 House & Objects</option>
        <option value="nature">🌳 Nature</option>
        <option value="school">🏫 School</option>
        <option value="vehicles">🚗 Vehicles</option>
        <option value="body">👦 Body & People</option>
        <option value="toys">🎮 Toys & Fun</option>
      </select>
    </div>

    <!-- Fixed stats row -->
    <div class="stats-row">
      <span class="score" id="score">Score: 0 / 0</span>
      <span class="streak" id="streak">Streak: 0 🔥</span>
    </div>

    <div class="card" id="card">
      <div class="english" id="english"></div>
      <div class="word" id="word">Loading...</div>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="buttons">
      <button class="de-btn" id="deBtn">DE</button>
      <button class="het-btn" id="hetBtn">HET</button>
    </div>

    <button class="next-btn" id="nextBtn">Next Word →</button>

    <div class="volume-control">
      <label>🔊 Volume: </label>
      <input type="range" id="volume" min="0" max="1" step="0.05" value="0.7" style="width:220px;">
    </div>
  </div>

  <script>
    // (Same JavaScript as before - only layout changed)
    const allWords = {
      animals: { "kat": ["de", "cat 🐱"], "hond": ["de", "dog 🐶"], "vogel": ["de", "bird 🐦"], "konijn": ["het", "rabbit 🐰"], "paard": ["het", "horse 🐴"], "vis": ["de", "fish 🐟"], "leeuw": ["de", "lion 🦁"], "aap": ["de", "monkey 🐵"], "olifant": ["de", "elephant 🐘"], "kip": ["de", "chicken 🐔"], "koe": ["de", "cow 🐮"] },
      food: { "appel": ["de", "apple 🍎"], "banaan": ["de", "banana 🍌"], "brood": ["het", "bread 🍞"], "water": ["het", "water 💧"], "melk": ["de", "milk 🥛"], "kaas": ["de", "cheese 🧀"], "ei": ["het", "egg 🥚"], "ijsje": ["het", "ice cream 🍦"], "cake": ["de", "cake 🎂"] },
      house: { "huis": ["het", "house 🏠"], "bed": ["het", "bed 🛏️"], "raam": ["het", "window 🪟"], "deur": ["de", "door 🚪"], "tafel": ["de", "table 🪑"], "stoel": ["de", "chair 🪑"], "kast": ["de", "cupboard 🗄️"], "lamp": ["de", "lamp 💡"] },
      nature: { "boom": ["de", "tree 🌳"], "bloem": ["de", "flower 🌸"], "zon": ["de", "sun ☀️"], "maan": ["de", "moon 🌙"], "ster": ["de", "star ⭐"], "bos": ["het", "forest 🌲"] },
      school: { "school": ["de", "school 🏫"], "boek": ["het", "book 📖"], "pen": ["de", "pen 🖊️"], "tas": ["de", "bag 🎒"], "juf": ["de", "teacher 👩‍🏫"] },
      vehicles: { "auto": ["de", "car 🚗"], "fiets": ["de", "bike 🚲"], "trein": ["de", "train 🚄"], "boot": ["de", "boat ⛵"] },
      body: { "jongen": ["de", "boy 👦"], "meisje": ["het", "girl 👧"], "kind": ["het", "child 👦"] },
      toys: { "bal": ["de", "ball ⚽"], "pop": ["de", "doll 🧸"], "beer": ["de", "teddy bear 🧸"] }
    };

    const audioCorrect = new Audio("https://www.orangefreesounds.com/wp-content/uploads/2021/04/Correct-answer-ding-sound-effect.mp3");
    const audioCheer   = new Audio("https://orangefreesounds.com/wp-content/uploads/2025/02/Kids-cheering-sound-effect.mp3");
    const audioWrong   = new Audio("https://www.soundjay.com/buttons/beep-07.mp3");
    const audioClick   = new Audio("https://www.soundjay.com/buttons/button-09.mp3");

    let score = 0, total = 0, streak = 0, currentWord = "", currentArticle = "", currentCategory = "all";

    const wordEl = document.getElementById("word");
    const englishEl = document.getElementById("english");
    const feedbackEl = document.getElementById("feedback");
    const scoreEl = document.getElementById("score");
    const streakEl = document.getElementById("streak");
    const deBtn = document.getElementById("deBtn");
    const hetBtn = document.getElementById("hetBtn");
    const nextBtn = document.getElementById("nextBtn");
    const card = document.getElementById("card");
    const categorySelect = document.getElementById("categorySelect");
    const volumeSlider = document.getElementById("volume");

    function setVolume(vol) {
      [audioCorrect, audioCheer, audioWrong, audioClick].forEach(a => a.volume = vol);
    }

    function playSound(audio) {
      try { audio.currentTime = 0; audio.play(); } catch(e) {}
    }

    function createConfetti(amount = 60) {
      for (let i = 0; i < amount; i++) {
        const c = document.createElement("div");
        c.style.position = "fixed";
        c.style.left = Math.random() * 100 + "vw";
        c.style.top = "-30px";
        c.style.width = c.style.height = (Math.random() * 12 + 8) + "px";
        c.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 60%)`;
        c.style.borderRadius = "50%";
        c.style.zIndex = "1000";
        c.style.animation = `confetti-fall ${Math.random()*3 + 3}s linear forwards`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 7000);
      }
    }

    function updateStreak(newStreak) {
      streak = newStreak;
      const emoji = streak >= 8 ? "🎉⭐" : streak >= 5 ? "🔥🔥" : streak >= 3 ? "🔥" : "🔥";
      streakEl.textContent = `Streak: ${streak} ${emoji}`;
    }

    function getCurrentWords() {
      if (currentCategory === "all") {
        let merged = {};
        Object.values(allWords).forEach(cat => Object.assign(merged, cat));
        return merged;
      }
      return allWords[currentCategory] || allWords.animals;
    }

    function newWord() {
      const words = getCurrentWords();
      const keys = Object.keys(words);
      currentWord = keys[Math.floor(Math.random() * keys.length)];
      [currentArticle, english] = words[currentWord];

      wordEl.textContent = currentWord.toUpperCase();
      englishEl.textContent = english;
      wordEl.style.color = "#1976D2";
      wordEl.style.transform = "scale(1)";

      feedbackEl.textContent = "";
      nextBtn.style.display = "none";
      deBtn.disabled = false;
      hetBtn.disabled = false;

      card.style.transform = "scale(0.9)";
      setTimeout(() => card.style.transform = "scale(1)", 10);
    }

    function checkAnswer(guess) {
      playSound(audioClick);
      deBtn.disabled = true;
      hetBtn.disabled = true;
      total++;

      const isCorrect = guess === currentArticle;

      if (isCorrect) {
        score++;
        streak++;
        feedbackEl.innerHTML = `🎉 Super goed! Correct! 🎉`;
        feedbackEl.style.color = "#388E3C";
        wordEl.style.color = "#388E3C";
        wordEl.style.transform = "scale(1.22)";

        playSound(audioCorrect);
        if (streak >= 5) { createConfetti(110); setTimeout(() => playSound(audioCheer), 250); }
        else if (streak >= 3) createConfetti(75);
        else createConfetti(45);
      } else {
        feedbackEl.innerHTML = `😅 Oops! It's <strong>${currentArticle.toUpperCase()} ${currentWord}</strong>`;
        feedbackEl.style.color = "#D32F2F";
        wordEl.style.color = "#D32F2F";
        streak = 0;
        playSound(audioWrong);
      }

      scoreEl.textContent = `Score: ${score} / ${total}`;
      updateStreak(streak);
      nextBtn.style.display = "inline-block";
    }

    // Event Listeners
    deBtn.addEventListener("click", () => checkAnswer("de"));
    hetBtn.addEventListener("click", () => checkAnswer("het"));
    nextBtn.addEventListener("click", newWord);

    categorySelect.addEventListener("change", () => {
      currentCategory = categorySelect.value;
      streak = 0;
      updateStreak(0);
      newWord();
    });

    document.addEventListener("keydown", e => {
      if (deBtn.disabled) return;
      if (e.key.toLowerCase() === "d") checkAnswer("de");
      if (e.key.toLowerCase() === "h") checkAnswer("het");
    });

    volumeSlider.addEventListener("input", e => setVolume(parseFloat(e.target.value)));

    // Start game
    setVolume(0.7);
    updateStreak(0);
    newWord();
  </script>
</body>
</html>
